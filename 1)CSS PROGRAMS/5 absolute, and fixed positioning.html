<!DOCTYPE html>
<html>
<head>

<style>
.relative {
  position: relative;
  left: 50px;
}

.absolute {
  position: absolute;
  top: 50px;
  left: 100px;
}

.fixed {
  position: fixed;
  bottom: 0;
  right: 0;
  background: red;
}
</style>

</head>

<body>

<p class="relative">Relative Position</p>

<p class="absolute">Absolute Position</p>

<p class="fixed">Fixed Position</p>

</body>
</html>
