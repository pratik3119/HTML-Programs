<!DOCTYPE html>
<html>
<head>

<title>CSS Types Example</title>

<!-- Internal CSS -->
<style>
p {
  color: blue;
  font-size: 18px;
}
</style>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Inline CSS -->
<h1 style="color:red;">This is Inline CSS</h1>

<p>This is Internal CSS</p>

<h2 class="ext">This is External CSS</h2>

</body>
</html>
