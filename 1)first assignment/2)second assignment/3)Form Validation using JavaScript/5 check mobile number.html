<!DOCTYPE html>
<html>
<body>

<input type="text" id="num" placeholder="Enter Mobile Number">
<br><br>

<button onclick="checkNumber()">Check</button>

<p id="result"></p>

<script>
function checkNumber() {
  let num = document.getElementById("num").value;

  if(num.length == 10)
    document.getElementById("result").innerHTML = "Valid Number";
  else
    document.getElementById("result").innerHTML = "Invalid Number";
}
</script>

</body>
</html>
